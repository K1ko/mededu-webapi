apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- deployment.yaml
- service.yaml

configMapGenerator:
  - name: kcrp-mededu-webapi-mongodb-init
    files:
      - params/init-db.js
  - name: kcrp-mededu-webapi-config
    literals:
      - database=kcrp-mededu
      - collection=trainings
patches:
- path: patches/webapi.deployment.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: kcrp-mededu-webapi
